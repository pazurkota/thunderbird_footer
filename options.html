<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Footer settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            color: #222;
        }
        h2 { margin-bottom: 4px; }
        .hint { color: #666; font-size: 13px; margin-bottom: 16px; }
        .columns {
            display: flex;
            gap: 20px;
        }
        .col { flex: 1; }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 14px;
            padding: 8px;
            box-sizing: border-box;
            resize: vertical;
        }
        #preview {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 300px;
            background: #fafafa;
        }
        button {
            margin-top: 12px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        #status {
            margin-left: 10px;
            color: green;
            font-size: 13px;
        }
    </style>
</head>
<body>
<h2>Edit footer (Markdown)</h2>
<p class="hint">Write footer in Markdown on the left — HTML preview will be on the right.
    Basic Markdown support: **bold**, *cursive*, [links](https://...), new lines.</p>

<div class="columns">
    <div class="col">
        <label><strong>Markdown</strong></label>
        <textarea id="markdown-input"></textarea>
    </div>
    <div class="col">
        <label><strong>Preview</strong></label>
        <div id="preview"></div>
    </div>
</div>

<button id="save-btn">Save footer</button>
<span id="status"></span>

<script src="libs/marked.min.js"></script>
<script src="options.js"></script>
</body>
</html>
